<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat - ConfiaChamba</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="config.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif; }
    .chat-container { height: 100vh; }
    .messages-container { height: calc(100vh - 200px); overflow-y: auto; }
    .message-bubble {
      max-width: 70%;
      word-wrap: break-word;
      padding: 12px 16px;
      border-radius: 12px;
      animation: slideIn 0.3s ease;
    }
    .message-bubble.sent {
      background-color: #4f46e5;
      color: white;
      margin-left: auto;
    }
    .message-bubble.received {
      background-color: #e5e7eb;
      color: #1f2937;
    }
    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .conversation-item {
      border-left: 4px solid transparent;
      transition: all 0.2s;
      cursor: pointer;
    }
    .conversation-item:hover {
      background-color: #f3f4f6;
      border-left-color: #4f46e5;
    }
    .conversation-item.active {
      background-color: #eef2ff;
      border-left-color: #4f46e5;
    }
    .badge-new {
      display: inline-block;
      background-color: #ef4444;
      color: white;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: bold;
    }
  </style>
</head>
<body class="bg-gray-50">
  <!-- Navbar -->
  <nav class="border-b bg-white sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
      <a href="index.html" class="flex items-center gap-2">
        <span class="text-xl font-bold text-gray-900">ConfiaChamba</span>
      </a>
      <div id="navLinks"></div>
    </div>
  </nav>

  <div class="chat-container flex">
    <!-- Sidebar de conversaciones -->
    <div class="w-80 bg-white border-r border-gray-200 flex flex-col">
      <!-- Header -->
      <div class="p-4 border-b border-gray-200">
        <h2 class="text-xl font-bold text-gray-900 mb-4">Mensajes</h2>
        <input 
          type="text" 
          id="searchInput" 
          placeholder="Buscar conversación..." 
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500"
        >
      </div>

      <!-- Lista de conversaciones -->
      <div id="conversationsList" class="flex-1 overflow-y-auto">
        <div class="p-4 text-center text-gray-500">
          Cargando conversaciones...
        </div>
      </div>
    </div>

    <!-- Area principal del chat -->
    <div class="flex-1 flex flex-col bg-gray-50" id="chatArea">
      <div class="flex-1 flex items-center justify-center">
        <div class="text-center text-gray-500">
          <p class="text-lg">Selecciona una conversación para comenzar</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Template para el chat activo -->
  <template id="chatTemplate">
    <!-- Header del chat -->
    <div class="bg-white border-b border-gray-200 p-4 flex justify-between items-center">
      <div>
        <h3 class="text-lg font-bold text-gray-900" id="chatUserName"></h3>
        <p class="text-sm text-gray-500" id="chatUserEmail"></p>
      </div>
      <button id="closeChatBtn" class="text-gray-500 hover:text-gray-700">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
        </svg>
      </button>
    </div>

    <!-- Mensajes -->
    <div id="messagesContainer" class="messages-container p-4 space-y-4"></div>

    <!-- Input de mensaje -->
    <div class="bg-white border-t border-gray-200 p-4">
      <form id="messageForm" class="flex gap-3">
        <input 
          type="text" 
          id="messageInput" 
          placeholder="Escribe tu mensaje..." 
          class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500"
          required
        >
        <button 
          type="submit" 
          class="bg-indigo-600 text-white px-6 py-2 rounded-lg hover:bg-indigo-700 transition"
        >
          Enviar
        </button>
      </form>
    </div>
  </template>
